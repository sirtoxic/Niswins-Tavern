<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Niswins Tavern — Character Forge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            parchment: '#f5e6c8',
            ink: '#2c1810',
            crimson: '#8b1a1a',
            gold: '#c9a227',
            darkbg: '#1a1209',
            panelbg: '#261c0e',
            border: '#5a3e28',
          },
          fontFamily: {
            serif: ['"Palatino Linotype"', 'Palatino', 'Georgia', 'serif'],
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #1a1209; color: #f5e6c8; font-family: 'Palatino Linotype', Georgia, serif; }
    .input-field {
      background: #1e1308; border: 1px solid #5a3e28; color: #f5e6c8;
      border-radius: 4px; padding: 0.5rem 0.75rem; width: 100%;
    }
    .input-field:focus { outline: none; border-color: #c9a227; box-shadow: 0 0 0 2px rgba(201,162,39,0.2); }
    .btn-primary {
      background: #8b1a1a; color: #f5e6c8; border: 1px solid #c9a227;
      padding: 0.6rem 1.5rem; border-radius: 4px; cursor: pointer; font-family: inherit;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #a52020; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: #261c0e; color: #f5e6c8; border: 1px solid #5a3e28;
      padding: 0.6rem 1.5rem; border-radius: 4px; cursor: pointer; font-family: inherit;
      transition: background 0.2s;
    }
    .btn-secondary:hover { background: #342510; }
    .panel { background: #261c0e; border: 1px solid #5a3e28; border-radius: 6px; padding: 1rem; }
    .stat-box {
      background: #1a1209; border: 1px solid #5a3e28; border-radius: 4px;
      text-align: center; padding: 0.5rem;
    }
    .proficient-dot { color: #c9a227; font-size: 0.7rem; }
    .expertise-dot { color: #4a9eff; font-size: 0.7rem; }
    .breakdown-text { color: #8a7560; font-size: 0.7rem; }
    .source-tag {
      background: #342510; border: 1px solid #5a3e28; border-radius: 3px;
      font-size: 0.65rem; padding: 1px 5px; color: #c9a227;
    }
    .section-header {
      color: #c9a227; border-bottom: 1px solid #5a3e28;
      font-size: 0.75rem; font-weight: bold; letter-spacing: 0.1em;
      text-transform: uppercase; padding-bottom: 0.25rem; margin-bottom: 0.5rem;
    }
    .spinner { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    select option { background: #1e1308; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1a1209; }
    ::-webkit-scrollbar-thumb { background: #5a3e28; border-radius: 3px; }
  </style>
</head>
<body class="min-h-screen">

  <!-- Header -->
  <header class="border-b border-border px-6 py-4 flex items-center gap-4">
    <div>
      <h1 class="text-gold text-2xl font-bold tracking-wide">⚔ Niswins Tavern</h1>
      <p class="text-xs text-gray-500">Character Forge</p>
    </div>
  </header>

  <div class="flex h-[calc(100vh-73px)]">

    <!-- Left panel: form -->
    <aside class="w-80 flex-shrink-0 border-r border-border overflow-y-auto p-4 space-y-4">
      <div class="section-header">Create Character</div>

      <div class="space-y-3">
        <div>
          <label class="text-xs text-gray-400 block mb-1">Concept / Description</label>
          <textarea id="concept" rows="3" placeholder="e.g. A grizzled ex-soldier who drinks too much and talks to their sword..." class="input-field resize-none text-sm"></textarea>
        </div>

        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="text-xs text-gray-400 block mb-1">Race</label>
            <input id="race" type="text" placeholder="e.g. Half-Elf" class="input-field text-sm" />
          </div>
          <div>
            <label class="text-xs text-gray-400 block mb-1">Class</label>
            <input id="charClass" type="text" placeholder="e.g. Fighter" class="input-field text-sm" />
          </div>
        </div>

        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="text-xs text-gray-400 block mb-1">Level</label>
            <select id="level" class="input-field text-sm">
              <script>for(let i=1;i<=20;i++) document.write(`<option value="${i}">${i}</option>`)</script>
            </select>
          </div>
          <div>
            <label class="text-xs text-gray-400 block mb-1">Alignment</label>
            <select id="alignment" class="input-field text-sm">
              <option>Lawful Good</option>
              <option>Neutral Good</option>
              <option>Chaotic Good</option>
              <option>Lawful Neutral</option>
              <option selected>True Neutral</option>
              <option>Chaotic Neutral</option>
              <option>Lawful Evil</option>
              <option>Neutral Evil</option>
              <option>Chaotic Evil</option>
            </select>
          </div>
        </div>

        <div>
          <label class="text-xs text-gray-400 block mb-1">Appearance</label>
          <textarea id="appearance" rows="2" placeholder="Tall, lean, with silver-streaked black hair and tired eyes..." class="input-field resize-none text-sm"></textarea>
        </div>

        <div>
          <label class="text-xs text-gray-400 block mb-1">Backstory Detail</label>
          <div class="flex gap-2">
            <button onclick="setDetail('short')" id="detail-short" class="flex-1 btn-secondary text-xs py-2">Short</button>
            <button onclick="setDetail('medium')" id="detail-medium" class="flex-1 btn-primary text-xs py-2">Medium</button>
            <button onclick="setDetail('long')" id="detail-long" class="flex-1 btn-secondary text-xs py-2">Long</button>
          </div>
        </div>

        <div>
          <label class="text-xs text-gray-400 block mb-1">Additional Notes <span class="text-gray-600">(optional)</span></label>
          <textarea id="notes" rows="2" placeholder="Has a missing left hand, replaced with a prosthetic..." class="input-field resize-none text-sm"></textarea>
        </div>

        <button id="generateBtn" onclick="generateCharacter()" class="btn-primary w-full flex items-center justify-center gap-2">
          <svg id="generateSpinner" class="hidden spinner w-4 h-4" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
          <span id="generateBtnText">Generate Character</span>
        </button>
      </div>

      <!-- Save section (shown after generation) -->
      <div id="saveSection" class="hidden space-y-2 pt-2 border-t border-border">
        <div class="section-header">Save to Docmost</div>
        <div>
          <label class="text-xs text-gray-400 block mb-1">Folder</label>
          <select id="saveFolder" class="input-field text-sm">
            <option value="npcs">NPCs</option>
          </select>
        </div>
        <button onclick="saveCharacter()" id="saveBtn" class="btn-secondary w-full flex items-center justify-center gap-2">
          <svg id="saveSpinner" class="hidden spinner w-4 h-4" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
          <span id="saveBtnText">Save to Docmost</span>
        </button>
        <div id="saveResult" class="hidden text-xs text-center py-1"></div>
      </div>
    </aside>

    <!-- Right panel: character sheet -->
    <main class="flex-1 overflow-y-auto p-6" id="sheetContainer">
      <div id="placeholder" class="h-full flex items-center justify-center text-gray-600">
        <div class="text-center">
          <div class="text-6xl mb-4">⚔</div>
          <p class="text-lg">Fill in the form and generate a character</p>
          <p class="text-sm mt-1">The stat block will appear here</p>
        </div>
      </div>
      <div id="characterSheet" class="hidden space-y-4"></div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
